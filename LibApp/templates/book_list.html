{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center">
    <h3>📘 Book List</h3>
    <a href="{% url 'LibApp:add_book' %}" class="btn btn-primary">+ Add Book</a>
</div>

<div class="mt-3 mb-3">
  <div class="input-group">
      <input type="text"
             id="searchInput"
             class="form-control"
             placeholder="Search by title or author...">
      <span class="input-group-text">🔍</span>
  </div>
</div>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Status</th>
      <th>Access Count</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="bookTable">
    {% for book in books %}
    <tr>
      <td>{{ book.title }}</td>
      <td>{{ book.author }}</td>
      <td>{{ book.status }}</td>
      <td>{{ book.access_count }}</td>
      <td>
        <a href="{% url 'LibApp:book_detail' book.id %}" class="btn btn-sm btn-info">View</a>
      </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5" class="text-center">No books found</td>
    </tr>
    {% endfor %}
  </tbody>

</table>

<script>
const searchInput = document.getElementById("searchInput");
const tableBody = document.getElementById("bookTable");

searchInput.addEventListener("keyup", function() {

    fetch(`/search-books/?q=${this.value}`)
    .then(response => response.json())
    .then(data => {

        tableBody.innerHTML = "";

        data.forEach(book => {

            tableBody.innerHTML += `
                <tr>
                    <td>${book.title}</td>
                    <td>${book.author}</td>
                    <td>${book.status}</td>
                    <td>${book.access_count}</td>
                    <td>
                        <a href="/books/${book.id}/"
                        class="btn btn-sm btn-info">View</a>
                    </td>
                </tr>
            `;

        });

        if(data.length === 0){
            tableBody.innerHTML =
            `<tr><td colspan="5" class="text-center">No books found</td></tr>`;
        }

    });

});
</script>

{% endblock %}
